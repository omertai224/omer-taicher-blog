<!-- repo: omer-taicher-blog | קובץ: index.html -->
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>עומר טייכר · הבלוג</title>
<meta name="description" content="טיפים פשוטים לטכנולוגיה יומיומית. מחשבים, סמארטפונים ואינטרנט — בשפה ברורה.">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --orange: #f6a67e;
  --orange-deep: #e8854a;
  --orange-light: #fdeede;
  --navy: #1a4a6b;
  --navy-mid: #1e5f74;
  --cream: #fdf8f2;
  --cream2: #f5ede0;
  --text: #1e1e1e;
  --text-mid: #555;
  --text-light: #999;
  --border: #e8e0d6;
}
body { font-family:'Rubik',sans-serif; background:var(--cream); color:var(--text); direction:rtl; }

/* NAV */
nav {
  padding:0 20px;
  height:60px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:fixed; top:0; width:100%;
  background:rgba(253,248,242,0.97);
  backdrop-filter:blur(12px); z-index:100;
}
.logo { font-size:1.1rem; font-weight:800; color:var(--navy); text-decoration:none; }
.logo span { color:var(--orange-deep); }
.nav-cta {
  background:var(--orange-deep); color:#fff; border:none;
  padding:9px 22px; border-radius:50px;
  font-size:0.85rem; font-weight:700; cursor:pointer; font-family:inherit;
  text-decoration:none; display:inline-block;
}

/* HERO */
.hero {
  display:grid; grid-template-columns:1fr 380px;
  min-height:52vh;
  border-bottom:1px solid var(--border);
  background:var(--cream2);
  text-decoration:none; color:inherit;
  cursor:pointer; transition:filter 0.2s;
}
.hero:hover { filter:brightness(0.97); }
.hero-content {
  padding:56px 60px;
  display:flex; flex-direction:column; justify-content:center;
}
.hero-label {
  font-size:0.65rem; font-weight:700; letter-spacing:0.2em;
  color:var(--orange-deep); text-transform:uppercase; margin-bottom:20px;
  display:flex; align-items:center; gap:10px;
}
.hero-label::before { content:''; width:28px; height:2px; background:var(--orange-deep); display:block; }
.hero h1 {
  font-size:clamp(1.6rem,3vw,2.4rem);
  font-weight:900; line-height:1.2; color:var(--navy);
  margin-bottom:16px; letter-spacing:-0.02em;
}
.hero h1 em { font-style:normal; color:var(--orange-deep); }
.hero-excerpt { font-size:0.92rem; color:var(--text-mid); line-height:1.75; margin-bottom:28px; max-width:440px; }
.hero-read {
  display:inline-flex; align-items:center; gap:10px;
  color:var(--navy); font-weight:700; font-size:0.9rem;
  text-decoration:none; border-bottom:2px solid var(--orange-deep);
  padding-bottom:3px; width:fit-content;
}
.hero-meta {
  margin-top:32px; padding-top:24px;
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:16px;
  font-size:0.78rem; color:var(--text-mid);
}
.hero-meta strong { color:var(--navy); }
.hero-img {
  position:relative; overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,#1a4a6b,#1e5f74);
  font-size:6rem;
  align-self:center;
  margin:24px;
  border-radius:16px;
  border:1px solid var(--border);
}
.hero-img::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 40% 40%, rgba(246,166,126,0.2) 0%, transparent 65%);
  border-radius:16px;
}
.hero-img img { width:100%; height:100%; object-fit:cover; }
.hero-num {
  position:absolute; bottom:16px; right:16px;
  font-size:0.6rem; color:rgba(255,255,255,0.4); letter-spacing:0.1em;
}

/* POSTS HEADER */
.posts-header {
  padding:36px 60px 18px;
  display:flex; align-items:baseline; justify-content:space-between;
  border-bottom:1px solid var(--border);
}
.posts-header h2 {
  font-size:0.65rem; font-weight:700;
  letter-spacing:0.2em; color:var(--text-light); text-transform:uppercase;
}
.posts-count { font-size:0.78rem; color:var(--text-light); }

/* POST ROW */
.post-row {
  display:grid;
  grid-template-columns:1fr 260px;
  min-height:220px;
  border-bottom:1px solid var(--border);
  text-decoration:none; color:inherit;
  cursor:pointer;
  transition:background 0.18s;
}
.post-row:hover { background:var(--cream2); }
.post-row:hover .row-arrow { background:var(--orange-light); transform:translateX(-4px); }
.post-row.blue { background:#fff; }
.post-row.blue .post-row-img { background:linear-gradient(135deg,#1a4a6b,#1e5f74); }
.post-row.orange { background:var(--orange-light); }
.post-row.orange .post-row-img { background:linear-gradient(135deg,#e8854a,#f6a67e); }
.post-row.orange .row-num { color:var(--orange-deep); }
.post-row.orange .post-row-body p { color:var(--text-mid); }
.post-row.orange .row-time { color:var(--text-light); }
.post-row.orange .row-arrow { border-color:var(--orange-deep); color:var(--orange-deep); }

.post-row-img {
  display:flex; align-items:center; justify-content:center;
  font-size:4rem; position:relative; overflow:hidden;
  border-right:1px solid var(--border);
  aspect-ratio:1;
  align-self:center;
  margin:20px;
  border-radius:14px;
  order:2;
}
.post-row-img::after {
  content:''; position:absolute; inset:0;
  background:radial-gradient(circle at 40% 40%, rgba(255,255,255,0.1) 0%, transparent 70%);
  border-radius:14px;
}
.post-row-img img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }

.post-row-body {
  padding:32px 40px 32px 24px;
  display:flex; flex-direction:column; justify-content:center; gap:12px;
  order:1;
}
.row-num {
  font-size:0.6rem; font-weight:700;
  color:var(--text-light); letter-spacing:0.15em;
}
.post-row-body h3 {
  font-size:1.1rem; font-weight:800;
  color:var(--navy); line-height:1.38; letter-spacing:-0.01em;
}
.post-row-body p {
  font-size:0.85rem; line-height:1.7;
  color:var(--text-mid); max-width:500px;
}
.row-footer {
  display:flex; align-items:center; justify-content:space-between; margin-top:4px;
}
.row-time { font-size:0.72rem; color:var(--text-light); }
.row-arrow {
  width:34px; height:34px; border-radius:50%;
  border:1.5px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  color:var(--text-mid); font-size:0.85rem; transition:all 0.2s;
}

/* LOAD MORE */
.load-more {
  padding:40px; text-align:center;
  border-bottom:1px solid var(--border);
  background:#fff;
}
.load-more-btn {
  background:transparent; color:var(--navy);
  border:1.5px solid var(--border);
  padding:13px 36px; border-radius:50px;
  font-size:0.88rem; font-weight:600; cursor:pointer; font-family:inherit;
  transition:all 0.2s;
}
.load-more-btn:hover { border-color:var(--orange-deep); color:var(--orange-deep); }
.load-more-btn:disabled { opacity:0.4; cursor:default; }

/* CTA */
.cta-strip {
  background:var(--navy);
  padding:44px 60px;
  display:flex; align-items:center; justify-content:space-between; gap:40px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}
.cta-strip h3 { font-size:1.4rem; font-weight:800; color:#fff; }
.cta-strip p { font-size:0.88rem; color:rgba(255,255,255,0.75); margin-top:6px; }
.cta-btn-white {
  background:var(--orange); color:var(--navy);
  border:none; padding:13px 32px; border-radius:50px;
  font-size:0.9rem; font-weight:800; cursor:pointer; font-family:inherit;
  white-space:nowrap; flex-shrink:0; transition:transform 0.2s;
  text-decoration:none; display:inline-block;
}
.cta-btn-white:hover { transform:scale(1.04); }

/* FOOTER */
footer {
  background:var(--cream2);
  padding:32px 60px;
  display:flex; align-items:center; justify-content:space-between;
  color:var(--text-mid); font-size:0.8rem;
  border-top:1px solid var(--border);
}
.footer-logo { font-size:1rem; font-weight:800; color:var(--navy); }
.footer-logo span { color:var(--orange-deep); }

/* EMPTY STATE */
.empty-state {
  padding:80px 60px; text-align:center;
  color:var(--text-mid); background:#fff;
  border-bottom:1px solid var(--border);
}

/* MOBILE */
@media(max-width:768px){
  nav { padding:0 20px; }
  .hero { grid-template-columns:1fr; min-height:auto; }
  .hero-img { order:-1; margin:20px 20px 0; width:calc(100% - 40px); aspect-ratio:16/9; font-size:4rem; }
  .hero-content { padding:28px 20px 40px; }
  .posts-header { padding:24px 20px 14px; }
  .post-row { grid-template-columns:1fr; min-height:auto; }
  .post-row-img { order:-1; margin:16px 16px 0; width:calc(100% - 32px); aspect-ratio:16/9; border-right:none; font-size:3rem; }
  .post-row-body { padding:20px 20px 24px; }
  .cta-strip { flex-direction:column; padding:36px 20px; text-align:center; }
  footer { flex-direction:column; gap:10px; padding:24px 20px; }
  .load-more { padding:28px 20px; }
}
</style>
</head>
<body>

<nav>
  <a href="https://omertai.net" class="logo">עומר <span>טייכר</span> <span style="font-weight:400;color:rgba(255,255,255,0.45);font-size:0.9rem">· הבלוג</span></a>
  <a href="https://omertai.net" class="nav-cta">📞 צור קשר</a>
</nav>

<div id="hero-container"></div>

<div class="posts-header">
  <h2>כל הפוסטים</h2>
  <span class="posts-count" id="posts-count">טוען...</span>
</div>

<div id="posts-list"></div>

<div class="load-more" id="load-more-section" style="display:none;">
  <button class="load-more-btn" id="load-more-btn" onclick="loadMore()">טען עוד פוסטים ↓</button>
</div>

<div class="cta-strip">
  <div>
    <h3>יש לכם שאלה? אני כאן.</h3>
    <p>25 שנות ניסיון בשירות שלכם — בטלפון, בזום, או בביתכם.</p>
  </div>
  <a href="https://omertai.net" class="cta-btn-white">📞 דברו איתי</a>
</div>

<footer>
  <div class="footer-logo">עומר <span>טייכר</span></div>
  <span>© 2025 · כל הזכויות שמורות</span>
  <div style="margin-top:10px; font-size:0.78rem; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
    <a href="https://omertai.net/pages/legal/terms.html" style="color:inherit; opacity:0.6; text-decoration:none;">תקנון</a>
    <a href="https://omertai.net/pages/legal/privacy.html" style="color:inherit; opacity:0.6; text-decoration:none;">פרטיות</a>
    <a href="https://omertai.net/pages/legal/refund.html" style="color:inherit; opacity:0.6; text-decoration:none;">מדיניות החזרים</a>
    <a href="https://omertai.net/pages/legal/accessibility.html" style="color:inherit; opacity:0.6; text-decoration:none;">נגישות</a>
  </div>
</footer>

<script>
const POSTS_PER_PAGE = 4;
let allPosts = [];
let displayedCount = 0;

function formatDate(dateStr) {
  const d = new Date(dateStr);
  const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function renderHero(post) {
  const imgContent = post.image
    ? `<img src="${post.image}" alt="${post.image_alt || post.title}">`
    : post.emoji;
  document.getElementById('hero-container').innerHTML = `
    <a class="hero" href="post.html?id=${post.id}">
      <div class="hero-content">
        <div class="hero-label">הפוסט האחרון</div>
        <h1>${post.title}</h1>
        <p class="hero-excerpt">${post.excerpt}</p>
        <span class="hero-read">קרא את הפוסט ←</span>
        <div class="hero-meta">
          <strong>עומר טייכר</strong>
          <span>·</span><span>${formatDate(post.date)}</span>
        </div>
      </div>
      <div class="hero-img">${imgContent}<div class="hero-num">01 / ${String(allPosts.length).padStart(2,'0')}</div></div>
    </a>`;
}

function renderPostRow(post, index, colorClass) {
  const imgContent = post.image
    ? `<img src="${post.image}" alt="${post.image_alt || post.title}">`
    : post.emoji;
  return `
    <a class="post-row ${colorClass}" href="post.html?id=${post.id}">
      <div class="post-row-body">
        <span class="row-num">${String(index + 2).padStart(2,'0')}</span>
        <h3>${post.title}</h3>
        <p>${post.excerpt}</p>
        <div class="row-footer">
          <span class="row-time">${formatDate(post.date)}</span>
          <div class="row-arrow">←</div>
        </div>
      </div>
      <div class="post-row-img">${imgContent}</div>
    </a>`;
}

function loadMore() {
  const list = document.getElementById('posts-list');
  const remaining = allPosts.slice(displayedCount + 1, displayedCount + 1 + POSTS_PER_PAGE);
  remaining.forEach((post, i) => {
    const isLast = (i === remaining.length - 1);
    const colorClass = isLast ? 'blue' : (i % 2 === 0 ? 'orange' : 'blue');
    list.insertAdjacentHTML('beforeend', renderPostRow(post, displayedCount + i, colorClass));
  });
  displayedCount += remaining.length;
  const btn = document.getElementById('load-more-btn');
  const total = allPosts.length - 1;
  if (displayedCount >= total) {
    document.getElementById('load-more-section').style.display = 'none';
  } else {
    btn.textContent = `טען עוד פוסטים ↓ (${total - displayedCount} נותרו)`;
  }
}

async function init() {
  try {
    const res = await fetch('posts.json');
    const data = await res.json();
    allPosts = data.posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    document.getElementById('posts-count').textContent = `${allPosts.length} פוסטים`;

    if (allPosts.length === 0) {
      document.getElementById('hero-container').innerHTML = '';
      document.getElementById('posts-list').innerHTML = '<div class="empty-state">אין פוסטים עדיין.</div>';
      return;
    }

    renderHero(allPosts[0]);

    const list = document.getElementById('posts-list');
    const firstBatch = allPosts.slice(1, 1 + POSTS_PER_PAGE);
    firstBatch.forEach((post, i) => {
      const isLast = (i === firstBatch.length - 1);
      const colorClass = isLast ? 'blue' : (i % 2 === 0 ? 'orange' : 'blue');
      list.insertAdjacentHTML('beforeend', renderPostRow(post, i, colorClass));
    });
    displayedCount = firstBatch.length;

    if (allPosts.length > 1 + POSTS_PER_PAGE) {
      document.getElementById('load-more-section').style.display = 'block';
      const remaining = allPosts.length - 1 - POSTS_PER_PAGE;
      document.getElementById('load-more-btn').textContent = `טען עוד פוסטים ↓ (${remaining} נותרו)`;
    }
  } catch(e) {
    document.getElementById('posts-count').textContent = '';
    console.error('Failed to load posts:', e);
  }
}

init();
</script>
<script src="toolbar.js"></script>
<script src="https://cdn.enable.co.il/licenses/enable-L3247ax2zm0fj6l-0219-80373/init.js"></script>
</body>
</html>
